<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Booster Speech Console</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Booster Robot</p>
        <h1>Speech Console</h1>
        <p class="lede">Minimal listening console running directly on the robot.</p>
      </section>

      <section class="panel">
        <div class="panel-grid">
          <div class="panel-column">
            <div class="panel-head">
              <h2>Controls</h2>
              <div class="button-row">
                <button id="start-tts" class="ghost">Start Listening</button>
                <button id="stop-tts" class="ghost">Stop Listening</button>
              </div>
            </div>

            <div class="battery-card">
              <div class="battery-shell">
                <div id="battery-level" class="battery-level"></div>
              </div>
              <div class="battery-stats">
                <div id="battery-pill" class="pill">Waiting</div>
                <div id="battery-percent" class="battery-main">--%</div>
                <div id="battery-details" class="summary">Waiting for battery data...</div>
              </div>
            </div>

            <div class="volume-panel">
              <div class="volume-head">
                <label class="tts-label" for="volume-slider">Speaker Volume</label>
                <span id="volume-value" class="volume-value">--%</span>
              </div>
              <input id="volume-slider" class="volume-slider" type="range" min="0" max="150" step="1" value="100">
            </div>
          </div>

          <div class="panel-column">
            <section class="video-panel" aria-labelledby="video-preview-title">
              <div class="video-head">
                <div>
                  <h3 id="video-preview-title" class="video-title">Video Preview</h3>
                  <p class="video-copy">Robot camera preview without browser camera permissions.</p>
                </div>
                <label class="video-toggle">
                  <input id="enable-video" type="checkbox">
                  <span>Enable video</span>
                </label>
              </div>
              <div class="video-meta">
                <span id="video-status" class="video-status">Off</span>
              </div>
              <div class="video-frame">
                <img id="video-preview" class="video-preview" alt="Robot camera preview">
                <div id="video-placeholder" class="video-placeholder">Video preview is off.</div>
              </div>
            </section>

            <section class="debug-panel" aria-labelledby="debug-title">
              <div class="debug-head">
                <div>
                  <h3 id="debug-title" class="video-title">Debug Log</h3>
                  <p class="video-copy">Live requests and transcript events.</p>
                </div>
                <button id="copy-debug" class="ghost" type="button">Copy Log</button>
              </div>
              <pre id="debug-window" class="debug-window"></pre>
            </section>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
